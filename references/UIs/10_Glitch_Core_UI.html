<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Award-Winning Glitch Core UI</title>
    
    <!-- Bold, technical typography -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050505;
            --text-light: #ffffff;
            --glitch-red: #ff003c;
            --glitch-blue: #00f0ff;
            --glitch-yellow: #fcee0a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Space Mono', monospace;
            overflow-x: hidden;
            /* Authentic CRT Scanline Overlay */
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 6px 100%;
        }

        /* --- Full Screen Background Glitch --- */
        /* Randomly flashes colors to simulate a broken screen */
        .bg-glitch-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
            background: transparent;
            animation: bg-flash 8s infinite;
        }

        @keyframes bg-flash {
            0%, 96%, 98%, 100% { background: transparent; }
            97% { background: rgba(255, 0, 60, 0.1); mix-blend-mode: color-burn; }
            99% { background: rgba(0, 240, 255, 0.1); mix-blend-mode: color-dodge; }
        }

        /* --- Navigation --- */
        nav {
            padding: 30px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-logo {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            position: relative;
        }

        /* --- The Hero Glitch Typo --- */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 5%;
            position: relative;
        }

        .glitch-heading {
            font-family: 'Syncopate', sans-serif;
            font-size: 7vw;
            line-height: 1;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            /* Primary color mix */
            color: var(--text-light);
        }

        /* CSS Clip-Path RGB Split Glitch */
        .glitch-heading::before,
        .glitch-heading::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            opacity: 0.8;
        }

        /* The Red/Yellow Glitch Slice */
        .glitch-heading::before {
            left: 4px;
            text-shadow: -2px 0 var(--glitch-red), 2px 0 var(--glitch-yellow);
            clip-path: inset(20% 0 80% 0);
            animation: glitch-slice-1 2s infinite linear alternate-reverse;
        }

        /* The Blue Glitch Slice */
        .glitch-heading::after {
            left: -4px;
            text-shadow: -2px 0 var(--glitch-blue);
            clip-path: inset(80% 0 5% 0);
            animation: glitch-slice-2 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-slice-1 {
            0% { clip-path: inset(20% 0 80% 0); transform: translate(-2px, 1px); }
            20% { clip-path: inset(60% 0 10% 0); transform: translate(2px, -1px); }
            40% { clip-path: inset(40% 0 50% 0); transform: translate(-2px, 2px); }
            60% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -2px); }
            80% { clip-path: inset(10% 0 70% 0); transform: translate(-1px, 1px); }
            100% { clip-path: inset(30% 0 20% 0); transform: translate(1px, -1px); }
        }

        @keyframes glitch-slice-2 {
            0% { clip-path: inset(10% 0 60% 0); transform: translate(2px, 2px); }
            20% { clip-path: inset(30% 0 20% 0); transform: translate(-2px, -2px); }
            40% { clip-path: inset(70% 0 10% 0); transform: translate(1px, 1px); }
            60% { clip-path: inset(20% 0 50% 0); transform: translate(-1px, -1px); }
            80% { clip-path: inset(90% 0 5% 0); transform: translate(2px, -1px); }
            100% { clip-path: inset(50% 0 30% 0); transform: translate(-2px, 1px); }
        }

        .hero-desc {
            margin-top: 30px;
            font-size: 1.2rem;
            max-width: 600px;
            color: #aaa;
            line-height: 1.6;
        }

        /* The dynamic JS typing container */
        .hacker-type-text {
            display: inline-block;
            min-height: 1.5em;
        }

        /* --- Glitch Hover Buttons --- */
        .glitch-btn {
            margin-top: 50px;
            padding: 15px 40px;
            background: transparent;
            color: var(--text-light);
            border: 1px solid var(--text-light);
            font-family: 'Space Mono', monospace;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
            overflow: hidden;
            display: inline-block;
        }

        .glitch-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: var(--glitch-blue);
            mix-blend-mode: difference;
            transition: left 0.3s ease;
        }

        .glitch-btn:hover::before {
            left: 0;
        }

        .glitch-btn:hover {
            color: var(--bg-dark);
            background: var(--text-light);
            box-shadow: 4px 4px 0 var(--glitch-red), -4px -4px 0 var(--glitch-blue);
            transform: translate(-2px, -2px);
        }

        /* --- Image Glitch Section --- */
        .grid-section {
            padding: 50px 5%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 50px;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            height: 500px;
            background: #111;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #444;
            font-size: 2rem;
            font-family: 'Syncopate', sans-serif;
            background: repeating-linear-gradient(
                45deg,
                #111,
                #111 10px,
                #151515 10px,
                #151515 20px
            );
            transition: transform 0.5s ease;
        }

        /* On hover, the image violently tears apart using CSS variables */
        .image-wrapper:hover .image-placeholder {
            animation: violent-tear 0.3s infinite;
        }

        @keyframes violent-tear {
            0% { transform: translate(0, 0) scale(1.05); filter: hue-rotate(0deg); }
            25% { transform: translate(-10px, 5px) scale(1.1); filter: hue-rotate(90deg) contrast(200%); }
            50% { transform: translate(10px, -5px) scale(1.05); filter: hue-rotate(180deg) invert(1); }
            75% { transform: translate(-5px, -10px) scale(1.1); filter: hue-rotate(270deg) contrast(300%); }
            100% { transform: translate(5px, 10px) scale(1.05); filter: hue-rotate(360deg); }
        }

        /* Glitch overlays that appear on hover */
        .img-glitch-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 60, 0.4); /* Glitch Red */
            mix-blend-mode: overlay;
            opacity: 0;
            pointer-events: none;
        }

        .image-wrapper:hover .img-glitch-overlay {
            opacity: 1;
            animation: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.8; background: rgba(255, 0, 60, 0.4); }
            50% { opacity: 0.2; background: rgba(0, 240, 255, 0.4); } /* Glitch Blue */
            100% { opacity: 0.9; background: rgba(252, 238, 10, 0.4); } /* Glitch Yellow */
        }

    </style>
</head>
<body>

    <div class="bg-glitch-flash"></div>

    <nav>
        <div class="nav-logo" data-text="SYSTEM.CORE">SYSTEM.CORE</div>
        <div style="font-size: 0.8rem; color: var(--glitch-red);">v2.0.4 // UNSTABLE</div>
    </nav>

    <section class="hero">
        <h1 class="glitch-heading" data-text="CORRUPTED">CORRUPTED</h1>
        <h1 class="glitch-heading" data-text="REALITY">REALITY</h1>
        
        <div class="hero-desc">
            <span class="hacker-type-text" id="typeTarget"></span>
        </div>

        <div>
            <button class="glitch-btn">Initialize Sequence</button>
        </div>
    </section>

    <section class="grid-section">
        <div class="image-wrapper">
            <div class="image-placeholder">DATA_LOG_01</div>
            <div class="img-glitch-overlay"></div>
        </div>
        <div class="image-wrapper">
            <div class="image-placeholder">DATA_LOG_02</div>
            <div class="img-glitch-overlay"></div>
        </div>
    </section>

    <script>
        // --- 1. Glitch Typo Script (Hacker Decode Effect) ---
        // This takes the target string and scrambles it before revealing the actual letters.
        const typeTarget = document.getElementById('typeTarget');
        const finalString = "Warning: Mainframe security has been compromised. The visual output is currently experiencing intense optical distortion due to corrupted CSS data streams.";
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=";
        
        let iteration = 0;
        let scrambleInterval = null;

        function startHackerTyping() {
            clearInterval(scrambleInterval);
            iteration = 0;
            
            scrambleInterval = setInterval(() => {
                // Map over the final string
                typeTarget.innerText = finalString.split("").map((char, index) => {
                    if (index < iteration) {
                        return finalString[index]; // Reveal correct letter
                    }
                    if (char === " ") return " "; // Keep spaces intact
                    // Return random glitchy character
                    return letters[Math.floor(Math.random() * letters.length)];
                }).join("");

                // Move forward by a fraction to make it look like it's decoding
                iteration += 1/3;

                if (iteration >= finalString.length) {
                    clearInterval(scrambleInterval);
                }
            }, 20); // Speed of the typing
        }

        // Trigger the intro typing effect when the page loads
        window.onload = () => {
            setTimeout(startHackerTyping, 500);
        };

        // --- 2. Random Glitch Stutters on the Navigation ---
        const navLogo = document.querySelector('.nav-logo');
        setInterval(() => {
            if(Math.random() > 0.8) {
                navLogo.style.transform = `translate(${Math.random() * 4 - 2}px, ${Math.random() * 4 - 2}px)`;
                navLogo.style.color = Math.random() > 0.5 ? 'var(--glitch-red)' : 'var(--glitch-blue)';
                setTimeout(() => {
                    navLogo.style.transform = 'translate(0,0)';
                    navLogo.style.color = 'var(--text-light)';
                }, 50);
            }
        }, 100);

    </script>
</body>
</html>
