<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KURA | Minimal Fashion</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg: #ffffff;
            --text: #111111;
            --gray: #888888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        nav {
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .menu-btn {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            font-weight: 500;
        }

        .hero {
            height: 70vh;
            display: flex;
            align-items: flex-end;
            padding: 4rem;
        }

        .hero-title {
            font-size: 8vw;
            font-weight: 500;
            line-height: 0.9;
            letter-spacing: -3px;
            text-transform: uppercase;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px;
            padding: 0 4rem 4rem;
        }

        .product-card {
            position: relative;
            aspect-ratio: 3/4;
            overflow: hidden;
            background: #f5f5f5;
            cursor: pointer;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .product-card:hover .product-image {
            transform: scale(1.05);
        }

        .product-info {
            position: absolute;
            bottom: 2rem;
            left: 2rem;
            display: flex;
            justify-content: space-between;
            width: calc(100% - 4rem);
            mix-blend-mode: difference;
            color: white;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        .product-card:hover .product-info {
            opacity: 1;
            transform: translateY(0);
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: 500;
        }

        .product-price {
            font-size: 1.2rem;
        }

        .marquee {
            padding: 4rem 0;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            overflow: hidden;
            white-space: nowrap;
            display: flex;
        }

        .marquee-inner {
            display: flex;
            animation: marquee 20s linear infinite;
        }

        .marquee-text {
            font-size: 4rem;
            font-weight: 300;
            text-transform: uppercase;
            padding: 0 2rem;
            color: var(--text);
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @media (max-width: 768px) {
            .products-grid { grid-template-columns: 1fr; gap: 1rem; padding: 1rem; }
            nav, .hero { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="menu-btn">Shop</div>
        <div class="logo">Kura</div>
        <div class="menu-btn">Cart (0)</div>
    </nav>

    <section class="hero">
        <h1 class="hero-title">Collection<br>N° 04</h1>
    </section>

    <section class="products-grid">
        <div class="product-card gs-up">
            <img class="product-image" src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1920&auto=format&fit=crop" alt="Fashion 1">
            <div class="product-info">
                <span class="product-name">Wool Coat</span>
                <span class="product-price">$450</span>
            </div>
        </div>
        <div class="product-card gs-up">
            <img class="product-image" src="https://images.unsplash.com/photo-1550614000-4b95d4eb61f6?q=80&w=1920&auto=format&fit=crop" alt="Fashion 2">
            <div class="product-info">
                <span class="product-name">Silk Blouse</span>
                <span class="product-price">$220</span>
            </div>
        </div>
        <div class="product-card gs-up">
            <img class="product-image" src="https://images.unsplash.com/photo-1539008835657-9e8e9680c956?q=80&w=1920&auto=format&fit=crop" alt="Fashion 3">
            <div class="product-info">
                <span class="product-name">Linen Trousers</span>
                <span class="product-price">$180</span>
            </div>
        </div>
        <div class="product-card gs-up">
            <img class="product-image" src="https://images.unsplash.com/photo-1434389670869-c6e4604f5eec?q=80&w=1920&auto=format&fit=crop" alt="Fashion 4">
            <div class="product-info">
                <span class="product-name">Knit Sweater</span>
                <span class="product-price">$290</span>
            </div>
        </div>
    </section>

    <div class="marquee">
        <div class="marquee-inner">
            <span class="marquee-text">New Arrivals • Free Shipping Worldwide • </span>
            <span class="marquee-text">New Arrivals • Free Shipping Worldwide • </span>
        </div>
    </div>

    <script>
        gsap.from("nav", {
            y: -20,
            opacity: 0,
            duration: 1,
            ease: "power3.out"
        });

        gsap.from(".hero-title", {
            y: 50,
            opacity: 0,
            duration: 1.2,
            ease: "power4.out",
            delay: 0.2
        });

        gsap.from(".gs-up", {
            y: 100,
            opacity: 0,
            duration: 1.2,
            stagger: 0.2,
            ease: "power3.out",
            delay: 0.5
        });
    </script>
</body>
</html>
