<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dental Hospital Contact</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #F4FAFC;
            --white: #FFFFFF;
            --primary: #0077B6;
            --primary-light: #48CAE4;
            --text-dark: #03045E;
            --text-muted: #5C7A99;
            --accent: #FF6B6B;
            --font-soft: 'Nunito', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            font-family: var(--font-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Calming fluid background elements */
        .fluid-shape {
            position: absolute;
            background: linear-gradient(135deg, var(--primary-light), var(--bg-main));
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            animation: pulse 15s infinite alternate;
        }
        .shape-1 { width: 500px; height: 500px; top: -10%; left: -5%; }
        .shape-2 { width: 600px; height: 600px; bottom: -15%; right: -5%; animation-delay: -5s;}

        @keyframes pulse {
            0% { transform: scale(1) translate(0,0); }
            100% { transform: scale(1.2) translate(50px, 50px); }
        }

        .container {
            width: 100%;
            max-width: 1100px;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }

        .text-section {
            padding-right: 2rem;
        }

        .badge {
            display: inline-block;
            background: rgba(72, 202, 228, 0.15);
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            letter-spacing: 1px;
        }

        .title {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            color: var(--text-dark);
        }
        
        .title span {
            color: var(--primary);
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .info-icon {
            width: 50px;
            height: 50px;
            background: var(--white);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0, 119, 182, 0.1);
        }

        .info-icon svg {
            width: 24px;
            height: 24px;
            stroke: var(--primary);
            fill: none;
        }

        .info-text h4 {
            font-size: 1rem;
            font-weight: 700;
        }
        .info-text p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* The Soft Form */
        .form-box {
            background: var(--white);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 119, 182, 0.08);
            position: relative;
        }

        .form-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 2rem;
            color: var(--text-dark);
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-control {
            width: 100%;
            background: #F8FBFC;
            border: 2px solid transparent;
            padding: 1rem 1.5rem;
            border-radius: 16px;
            font-family: var(--font-soft);
            font-size: 1rem;
            color: var(--text-dark);
            transition: all 0.3s ease;
        }

        .input-control:focus {
            outline: none;
            background: var(--white);
            border-color: var(--primary-light);
            box-shadow: 0 5px 15px rgba(72, 202, 228, 0.2);
        }

        .input-control::placeholder {
            color: #9EBBCC;
        }

        textarea.input-control {
            min-height: 120px;
            resize: none;
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: var(--white);
            border: none;
            padding: 1.2rem;
            border-radius: 16px;
            font-family: var(--font-soft);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 119, 182, 0.2);
        }

        .btn-submit:hover {
            background: #005f92;
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(0, 119, 182, 0.3);
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; gap: 2rem; }
            .text-section { padding-right: 0; text-align: center; }
            .info-item { justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="fluid-shape shape-1"></div>
    <div class="fluid-shape shape-2"></div>

    <section class="container">
        <div class="text-section gs-slide-up">
            <div class="badge">Professional Care</div>
            <h1 class="title">Your Smile, <br>Our <span>Priority</span>.</h1>
            <p class="subtitle">Experience pain-free, modern dentistry in a calming environment. Schedule your consultation today.</p>
            
            <div class="contact-info">
                <div class="info-item">
                    <div class="info-icon">
                        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                        </svg>
                    </div>
                    <div class="info-text">
                        <h4>Emergency Line</h4>
                        <p>1-800-DENTIST (24/7)</p>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">
                        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                    </div>
                    <div class="info-text">
                        <h4>Clinic Location</h4>
                        <p>123 Medical Parkway, Suite 100</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-section gs-slide-left">
            <div class="form-box">
                <h2 class="form-title">Book Appointment</h2>
                <form action="#" onsubmit="event.preventDefault();">
                    <div class="input-group">
                        <input type="text" class="input-control" placeholder="Patient Name" required>
                    </div>
                    <div class="input-group">
                        <input type="tel" class="input-control" placeholder="Phone Number" required>
                    </div>
                    <div class="input-group">
                        <input type="date" class="input-control" required style="color: #5C7A99;">
                    </div>
                    <div class="input-group">
                        <textarea class="input-control" placeholder="Reason for visit (e.g., Checkup, Pain, Whitening)"></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Confirm Request</button>
                </form>
            </div>
        </div>
    </section>

    <script>
        // Very soft, calming, fluid animations
        const tl = gsap.timeline();

        tl.from(".gs-slide-up", {
            y: 40,
            opacity: 0,
            duration: 1.2,
            ease: "power2.out"
        })
        .from(".gs-slide-left", {
            x: 40,
            opacity: 0,
            duration: 1.2,
            ease: "power2.out"
        }, "-=0.8")
        .from(".input-group", {
            y: 15,
            opacity: 0,
            duration: 0.8,
            stagger: 0.1,
            ease: "power2.out"
        }, "-=0.6");
    </script>
</body>
</html>
