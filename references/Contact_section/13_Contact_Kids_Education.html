<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playful Education Contact</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F0F8FF; /* Alice Blue */
            --yellow: #FFD166;
            --pink: #EF476F;
            --blue: #118AB2;
            --green: #06D6A0;
            --text-dark: #2D3142;
            --font-display: 'Fredoka One', cursive;
            --font-body: 'Quicksand', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-dark);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Playful Floating Background Shapes */
        .shape {
            position: absolute;
            z-index: 0;
        }

        .cloud {
            width: 150px; height: 50px;
            background: white;
            border-radius: 50px;
            top: 15%; left: 10%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .cloud::before {
            content: ''; position: absolute;
            width: 70px; height: 70px; background: white;
            border-radius: 50%; top: -30px; left: 20px;
        }
        .cloud::after {
            content: ''; position: absolute;
            width: 50px; height: 50px; background: white;
            border-radius: 50%; top: -20px; right: 25px;
        }

        .cloud-2 { top: 60%; right: 10%; transform: scale(1.5); opacity: 0.8; }

        .circle-dec {
            width: 80px; height: 80px;
            background: var(--yellow);
            border-radius: 50%;
            bottom: 15%; left: 20%;
            border: 4px solid #fff;
        }

        .square-dec {
            width: 60px; height: 60px;
            background: var(--pink);
            border-radius: 15px;
            top: 20%; right: 25%;
            transform: rotate(15deg);
            border: 4px solid #fff;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            align-items: center;
            padding: 2rem;
        }

        /* Left Side Text */
        .text-col h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 5vw, 4.5rem);
            color: var(--pink);
            line-height: 1.1;
            margin-bottom: 1.5rem;
            text-shadow: 3px 3px 0 var(--yellow), -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;
        }

        .text-col p {
            font-size: 1.2rem;
            font-weight: 500;
            line-height: 1.6;
            margin-bottom: 2rem;
            color: #4F5D75;
        }

        .mascot {
            width: 120px;
            height: 120px;
            background: var(--blue);
            border-radius: 40px 40px 10px 10px;
            position: relative;
            margin-top: 2rem;
            border: 4px solid var(--text-dark);
            box-shadow: 8px 8px 0 var(--text-dark);
        }
        
        .mascot-eyes {
            position: absolute; top: 40px; width: 100%; display: flex; justify-content: center; gap: 20px;
        }
        .eye {
            width: 15px; height: 15px; background: #fff; border-radius: 50%; position: relative; border: 3px solid var(--text-dark);
        }
        .eye::after {
            content: ''; position: absolute; width: 6px; height: 6px; background: var(--text-dark); border-radius: 50%; top: 2px; right: 2px;
        }
        .mascot-mouth {
            position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
            width: 30px; height: 15px; background: var(--pink);
            border-radius: 0 0 20px 20px;
            border: 3px solid var(--text-dark);
        }

        /* Right Side Form (Tactile/Squishy) */
        .form-card {
            background: #fff;
            padding: 3rem;
            border-radius: 40px;
            border: 6px solid var(--text-dark);
            box-shadow: 12px 12px 0 var(--yellow);
            transform-origin: center bottom;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-label {
            display: block;
            font-family: var(--font-display);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--blue);
        }

        .input-control {
            width: 100%;
            background: #F4F7FB;
            border: 3px solid #E2E8F0;
            border-radius: 20px;
            padding: 1.2rem;
            font-family: var(--font-body);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .input-control:focus {
            outline: none;
            background: #fff;
            border-color: var(--green);
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(6, 214, 160, 0.15);
        }

        .input-control::placeholder {
            color: #A0AEC0;
            font-weight: 500;
        }

        textarea.input-control {
            min-height: 120px;
            resize: none;
            border-radius: 20px;
        }

        /* The Bouncy Button */
        .btn-submit {
            width: 100%;
            background: var(--green);
            color: #fff;
            border: 4px solid var(--text-dark);
            padding: 1.2rem;
            border-radius: 30px;
            font-family: var(--font-display);
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 8px 0 var(--text-dark);
            transition: all 0.1s ease;
            margin-top: 1rem;
        }

        .btn-submit:active {
            transform: translateY(8px);
            box-shadow: 0 0 0 var(--text-dark);
        }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; gap: 4rem; }
            .text-col { text-align: center; display: flex; flex-direction: column; align-items: center;}
            .form-card { padding: 2rem; }
            .cloud-2, .circle-dec { display: none; }
        }
    </style>
</head>
<body>

    <!-- Floating Background Shapes -->
    <div class="shape cloud gs-float"></div>
    <div class="shape cloud cloud-2 gs-float-rev"></div>
    <div class="shape circle-dec gs-float"></div>
    <div class="shape square-dec gs-spin"></div>

    <section class="container">
        
        <div class="text-col">
            <h1 class="gs-pop">Let's Play <br>& Learn!</h1>
            <p class="gs-fade">Have questions about enrollment, curriculum, or just want to say hi? We'd love to hear from you.</p>
            
            <div class="mascot gs-pop" style="animation-delay: 0.5s;">
                <div class="mascot-eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
                <div class="mascot-mouth"></div>
            </div>
        </div>

        <div class="form-col gs-bounce">
            <div class="form-card">
                <form action="#" onsubmit="event.preventDefault();">
                    
                    <div class="input-group">
                        <label class="input-label">Parent's Name</label>
                        <input type="text" class="input-control" placeholder="e.g. Jane Doe" required>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Email Address</label>
                        <input type="email" class="input-control" placeholder="jane@example.com" required>
                    </div>

                    <div class="input-group">
                        <label class="input-label">How can we help?</label>
                        <textarea class="input-control" placeholder="I'd love to schedule a tour..." required></textarea>
                    </div>

                    <button type="submit" class="btn-submit">
                        Send Message! 🚀
                    </button>

                </form>
            </div>
        </div>

    </section>

    <script>
        // Playful, bouncy animations
        const tl = gsap.timeline();

        // Background floating
        gsap.to(".gs-float", { y: -20, duration: 2, yoyo: true, repeat: -1, ease: "sine.inOut" });
        gsap.to(".gs-float-rev", { y: 20, duration: 2.5, yoyo: true, repeat: -1, ease: "sine.inOut" });
        gsap.to(".gs-spin", { rotation: 360, duration: 20, repeat: -1, ease: "linear" });

        // Entrance animations
        tl.from(".gs-pop", {
            scale: 0, rotation: -15, opacity: 0, duration: 0.8, stagger: 0.2, ease: "back.out(1.7)"
        })
        .from(".gs-fade", {
            y: 20, opacity: 0, duration: 0.6, ease: "power2.out"
        }, "-=0.4")
        .from(".gs-bounce", {
            y: -500, rotation: 5, duration: 1.2, ease: "bounce.out"
        }, "-=0.6")
        .from(".input-group", {
            scale: 0.8, opacity: 0, duration: 0.4, stagger: 0.1, ease: "back.out(1.5)"
        }, "-=0.2");

        // Mascot eye tracking (Desktop only)
        const eyes = document.querySelectorAll('.eye::after'); // Need to target pseudoelement, but we can't easily with JS. 
        // Let's do a simpler container move for the eyes
        const eyeContainer = document.querySelector('.mascot-eyes');
        
        window.addEventListener('mousemove', (e) => {
            if(window.innerWidth > 900) {
                const x = (e.clientX / window.innerWidth - 0.5) * 10;
                const y = (e.clientY / window.innerHeight - 0.5) * 10;
                gsap.to(eyeContainer, { x: x, y: y, duration: 0.1 });
            }
        });
    </script>
</body>
</html>
