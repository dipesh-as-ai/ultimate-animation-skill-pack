<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Contact Section</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-light: #f7f6f2; /* Warm sophisticated off-white */
            --text-dark: #1a1a1a;
            --text-muted: #737373;
            --accent: #c45a3d; /* Terracotta / Warm accent */
            --border: #d4d2cc;
            --font-display: 'Syne', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .contact-layout {
            display: flex;
            min-height: 100vh;
        }

        /* Left Side: Editorial Image */
        .image-col {
            width: 45%;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: hidden;
        }

        .image-col img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%) contrast(1.1);
        }

        /* Right Side: Form Content */
        .content-col {
            width: 55%;
            padding: 6rem 8rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header-wrap { margin-bottom: 4rem; }

        .subtitle {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: block;
        }

        .title {
            font-family: var(--font-display);
            font-size: 4.5rem;
            font-weight: 600;
            line-height: 1;
            letter-spacing: -1px;
            margin-bottom: 1.5rem;
        }

        .desc {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
            max-width: 400px;
        }

        /* Quick Links / Support Options */
        .support-links {
            display: flex;
            gap: 2rem;
            margin-bottom: 4rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 2rem;
        }

        .support-card {
            flex: 1;
        }
        
        .support-card h4 {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .support-card a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
            position: relative;
        }

        .support-card a::after {
            content: ''; position: absolute;
            bottom: -2px; left: 0; width: 100%; height: 1px;
            background: var(--text-dark);
            transform: scaleX(0); transform-origin: right;
            transition: transform 0.3s ease;
        }

        .support-card a:hover { color: var(--text-dark); }
        .support-card a:hover::after { transform: scaleX(1); transform-origin: left; }

        /* The Form */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem 2rem;
        }

        .input-group { position: relative; }
        .input-group.full { grid-column: span 2; }

        .input-control {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 0.5rem 0;
            font-family: var(--font-body);
            font-size: 1rem;
            color: var(--text-dark);
            transition: border-color 0.3s;
            border-radius: 0;
        }

        .input-control:focus {
            outline: none;
            border-bottom-color: var(--text-dark);
        }

        .input-label {
            position: absolute;
            top: 0.5rem;
            left: 0;
            font-size: 0.9rem;
            color: var(--text-muted);
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .input-control:focus ~ .input-label,
        .input-control:not(:placeholder-shown) ~ .input-label {
            top: -15px;
            font-size: 0.75rem;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        textarea.input-control {
            resize: none;
            min-height: 50px;
        }

        /* Editorial Button */
        .btn-submit {
            grid-column: span 2;
            background: var(--text-dark);
            color: var(--bg-light);
            border: none;
            padding: 1.5rem 2rem;
            font-family: var(--font-display);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: color 0.4s;
            margin-top: 1rem;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 100%; left: 0;
            width: 100%; height: 100%;
            background: var(--accent);
            z-index: 1;
            transition: top 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .btn-submit:hover::before { top: 0; }
        .btn-submit span { position: relative; z-index: 2; }

        @media (max-width: 1024px) {
            .contact-layout { flex-direction: column; }
            .image-col { width: 100%; height: 50vh; position: relative; }
            .content-col { width: 100%; padding: 4rem 2rem; }
            .title { font-size: 3.5rem; }
            .form-grid { grid-template-columns: 1fr; }
            .input-group { grid-column: span 1; }
            .input-group.full { grid-column: span 1; }
            .btn-submit { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <section class="contact-layout">
        
        <div class="image-col">
            <!-- Using a high-fashion / editorial Unsplash image -->
            <img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d?q=80&w=2070&auto=format&fit=crop" class="gs-img" alt="Editorial Fashion">
        </div>

        <div class="content-col">
            <div class="header-wrap">
                <span class="subtitle gs-fade">Client Care</span>
                <h1 class="title gs-title">At your<br>service.</h1>
                <p class="desc gs-fade">Have a question regarding an order, styling advice, or our collections? Our dedicated team is here to assist you.</p>
            </div>

            <div class="support-links gs-fade">
                <div class="support-card">
                    <h4>Orders & Shipping</h4>
                    <a href="#">Track your order</a>
                </div>
                <div class="support-card">
                    <h4>Returns</h4>
                    <a href="#">View return policy</a>
                </div>
            </div>

            <form action="#" class="form-grid" onsubmit="event.preventDefault();">
                <div class="input-group gs-up">
                    <input type="text" id="fname" class="input-control" placeholder=" " required>
                    <label for="fname" class="input-label">First Name</label>
                </div>
                
                <div class="input-group gs-up">
                    <input type="text" id="lname" class="input-control" placeholder=" " required>
                    <label for="lname" class="input-label">Last Name</label>
                </div>

                <div class="input-group gs-up">
                    <input type="email" id="email" class="input-control" placeholder=" " required>
                    <label for="email" class="input-label">Email Address</label>
                </div>

                <div class="input-group gs-up">
                    <input type="text" id="order" class="input-control" placeholder=" ">
                    <label for="order" class="input-label">Order Number (Optional)</label>
                </div>

                <div class="input-group full gs-up">
                    <textarea id="message" class="input-control" placeholder=" " required></textarea>
                    <label for="message" class="input-label">How can we assist you?</label>
                </div>

                <button type="submit" class="btn-submit gs-up">
                    <span>Send Message</span>
                </button>
            </form>
        </div>
    </section>

    <script>
        // GSAP Animations
        gsap.registerPlugin(ScrollTrigger);

        const tl = gsap.timeline();

        // Image entrance
        tl.from(".gs-img", {
            scale: 1.1,
            opacity: 0,
            duration: 1.5,
            ease: "power3.out"
        })
        // Content entrances
        .from(".gs-fade", {
            y: 20,
            opacity: 0,
            duration: 1,
            stagger: 0.15,
            ease: "power3.out"
        }, "-=1")
        .from(".gs-title", {
            x: -30,
            opacity: 0,
            duration: 1,
            ease: "power3.out"
        }, "-=1.2")
        .from(".gs-up", {
            y: 30,
            opacity: 0,
            duration: 0.8,
            stagger: 0.1,
            ease: "power2.out"
        }, "-=0.8");

        // Parallax effect on image
        if (window.innerWidth > 1024) {
            gsap.to(".gs-img", {
                yPercent: 15,
                ease: "none",
                scrollTrigger: {
                    trigger: ".contact-layout",
                    start: "top top",
                    end: "bottom top",
                    scrub: true
                }
            });
        }
    </script>
</body>
</html>
