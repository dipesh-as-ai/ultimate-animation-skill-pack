<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Crypto Contact - Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #030305;
            --neon-cyan: #00f0ff;
            --neon-purple: #8a2be2;
            --neon-pink: #ff007f;
            --glass: rgba(15, 15, 20, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #8892b0;
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Dynamic Mesh Shader Background */
        .ambient-mesh {
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: 
                radial-gradient(circle at 50% 50%, rgba(138, 43, 226, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(0, 240, 255, 0.1) 0%, transparent 30%),
                radial-gradient(circle at 20% 80%, rgba(255, 0, 127, 0.1) 0%, transparent 30%);
            z-index: 0;
            animation: meshWarp 20s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes meshWarp {
            0% { transform: rotate(0deg) scale(1); }
            100% { transform: rotate(10deg) scale(1.2); }
        }

        /* Noise Texture Overlay */
        .noise-overlay {
            position: absolute;
            inset: 0;
            background-image: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="1.5" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.04"/%3E%3C/svg%3E');
            z-index: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        /* Left Branding */
        .brand-col h1 {
            font-family: var(--font-display);
            font-size: clamp(3rem, 5vw, 4.5rem);
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .brand-col h1 span {
            display: block;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-col p {
            font-size: 1.1rem;
            color: var(--text-dim);
            line-height: 1.6;
            max-width: 400px;
            margin-bottom: 3rem;
        }

        .wallet-connect {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 12px 24px;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 30px;
            color: var(--neon-cyan);
            font-family: var(--font-display);
            font-size: 0.9rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .wallet-connect:hover {
            background: rgba(0, 240, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }

        .pulse-dot {
            width: 8px; height: 8px;
            background: var(--neon-cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-cyan);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(0, 240, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0); }
        }

        /* Right Form - True Glassmorphism */
        .glass-form {
            background: var(--glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.02);
            position: relative;
            overflow: hidden;
        }

        /* Holographic Edge Sweep */
        .glass-form::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            animation: edgeSweep 4s linear infinite;
        }

        @keyframes edgeSweep {
            0% { left: -50%; }
            100% { left: 150%; }
        }

        .input-group {
            margin-bottom: 2rem;
            position: relative;
        }

        .input-label {
            position: absolute;
            top: -10px; left: 15px;
            background: var(--bg-deep); /* Masks the border behind it */
            padding: 0 5px;
            font-size: 0.75rem;
            font-family: var(--font-display);
            color: var(--neon-purple);
            letter-spacing: 1px;
            z-index: 2;
        }

        .input-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-control:focus {
            border-color: var(--neon-cyan);
            background: rgba(0, 240, 255, 0.03);
            box-shadow: inset 0 0 15px rgba(0, 240, 255, 0.05);
        }

        textarea.input-control {
            min-height: 120px;
            resize: vertical;
        }

        /* Kinetic Cyber Button */
        .btn-submit {
            width: 100%;
            background: linear-gradient(45deg, var(--neon-purple), var(--neon-cyan));
            border: none;
            border-radius: 12px;
            padding: 1.2rem;
            color: #fff;
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s;
            z-index: 1;
        }

        .btn-submit::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: var(--bg-deep);
            border-radius: 10px;
            z-index: -1;
            transition: opacity 0.3s;
        }

        .btn-submit:hover::after {
            opacity: 0;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 240, 255, 0.3);
        }
        
        .btn-submit span {
            position: relative;
            z-index: 2;
            transition: color 0.3s;
        }
        
        .btn-submit:hover span {
            color: #000;
        }

        @media (max-width: 960px) {
            .container { grid-template-columns: 1fr; gap: 3rem; }
            .brand-col h1 { font-size: 3rem; }
            .glass-form { padding: 2rem; }
            body { overflow-y: auto; padding: 2rem 0; align-items: flex-start;}
        }
    </style>
</head>
<body>

    <div class="ambient-mesh"></div>
    <div class="noise-overlay"></div>

    <main class="container">
        
        <div class="brand-col gs-stagger">
            <h1>Initialize<br><span>Protocol.</span></h1>
            <p>Establish a secure, encrypted transmission to our on-chain communication relay. Drop your ENS or wallet to verify identity.</p>
            
            <button class="wallet-connect">
                <div class="pulse-dot"></div>
                Connect Wallet
            </button>
        </div>

        <div class="form-col gs-stagger">
            <div class="glass-form">
                <form action="#" onsubmit="event.preventDefault();">
                    
                    <div class="input-group">
                        <label class="input-label">Identity</label>
                        <input type="text" class="input-control" placeholder="0x... or ENS Name (Optional)">
                    </div>

                    <div class="input-group">
                        <label class="input-label">Relay Address</label>
                        <input type="email" class="input-control" placeholder="Transmission Email" required>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Payload</label>
                        <textarea class="input-control" placeholder="Enter encrypted message here..." required></textarea>
                    </div>

                    <button type="submit" class="btn-submit">
                        <span>Sign & Transmit</span>
                    </button>

                </form>
            </div>
        </div>

    </main>

    <script>
        // High-end staggered load animation
        gsap.from(".gs-stagger > *", {
            y: 40,
            opacity: 0,
            duration: 1,
            stagger: 0.15,
            ease: "power3.out",
            delay: 0.2
        });

        // Add 3D tilt effect to the glass panel on mousemove (desktop only)
        const form = document.querySelector('.glass-form');
        
        document.addEventListener('mousemove', (e) => {
            if(window.innerWidth > 960) {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
                gsap.to(form, {
                    rotationY: xAxis,
                    rotationX: yAxis,
                    duration: 0.5,
                    ease: "power1.out"
                });
            }
        });
        
        // Reset tilt on mouseleave
        document.addEventListener('mouseleave', () => {
            gsap.to(form, { rotationY: 0, rotationX: 0, duration: 0.5 });
        });
    </script>
</body>
</html>
