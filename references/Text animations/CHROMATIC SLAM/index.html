<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chromatic Slam — Text Effect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <canvas id="shockwave-canvas"></canvas>

  <div class="noise-overlay"></div>
  <div class="scanlines"></div>

  <main class="scene">

    <div class="eyebrow">— EFFECT 01 —</div>

    <h1 class="slam-text" data-text="OVERWHELM">OVERWHELM</h1>

    <p class="sub-text" data-text="CHROMATIC SLAM ANIMATION">CHROMATIC SLAM ANIMATION</p>

    <div class="hint">hover over the letters</div>

  </main>

  <script src="script.js"></script>
</body>
</html>
