<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Layered Parallax Text</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@900&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #e0e5ec;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            /* Neumorphic background pattern */
            background-image: radial-gradient(#d1d9e6 20%, transparent 20%), radial-gradient(#d1d9e6 20%, transparent 20%);
            background-color: #e0e5ec;
            background-position: 0 0, 50px 50px;
            background-size: 100px 100px;
        }

        .container {
            perspective: 1000px; /* Gives the 3D depth */
        }

        .text-wrapper {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out; /* Smooth mouse tracking */
        }

        /* The base text styling */
        .text {
            font-size: 8rem;
            font-weight: 900;
            text-transform: uppercase;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            /* Transition for the hover snap-back */
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.5s ease;
        }

        /* Layer 1 (Bottom/Back) */
        .text:nth-child(1) {
            color: rgba(255, 0, 106, 0.8);
            transform: translate(-50%, -50%) translateZ(-80px);
            opacity: 0;
            text-shadow: 0 20px 30px rgba(255, 0, 106, 0.4);
        }

        /* Layer 2 */
        .text:nth-child(2) {
            color: rgba(0, 255, 170, 0.8);
            transform: translate(-50%, -50%) translateZ(-40px);
            opacity: 0;
        }

        /* Layer 3 */
        .text:nth-child(3) {
            color: rgba(0, 170, 255, 0.8);
            transform: translate(-50%, -50%) translateZ(0px);
            opacity: 0;
        }

        /* Layer 4 */
        .text:nth-child(4) {
            color: rgba(255, 238, 0, 0.8);
            transform: translate(-50%, -50%) translateZ(40px);
            opacity: 0;
        }

        /* Layer 5 (Top/Front) - This is the main visible text before hover */
        .text:nth-child(5) {
            color: #2b2b2b;
            transform: translate(-50%, -50%) translateZ(0px); /* Starts flat */
            opacity: 1;
            /* Text stroke effect for premium look */
            -webkit-text-stroke: 2px #2b2b2b;
        }

        /* --- HOVER STATE: SPLITTING THE LAYERS --- */
        
        .container:hover .text:nth-child(1) {
            transform: translate(-50%, -50%) translateZ(-120px) translateX(-20px) translateY(20px);
            opacity: 1;
        }

        .container:hover .text:nth-child(2) {
            transform: translate(-50%, -50%) translateZ(-60px) translateX(-10px) translateY(10px);
            opacity: 1;
        }

        .container:hover .text:nth-child(3) {
            transform: translate(-50%, -50%) translateZ(0px);
            opacity: 1;
        }

        .container:hover .text:nth-child(4) {
            transform: translate(-50%, -50%) translateZ(60px) translateX(10px) translateY(-10px);
            opacity: 1;
        }

        .container:hover .text:nth-child(5) {
            transform: translate(-50%, -50%) translateZ(120px) translateX(20px) translateY(-20px);
            color: transparent; /* Makes the top layer hollow */
        }
        
        /* Subtitle */
        .hint {
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1rem;
            color: #888;
            letter-spacing: 2px;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="text-wrapper" id="wrapper">
            <div class="text">DIMENSIONS</div>
            <div class="text">DIMENSIONS</div>
            <div class="text">DIMENSIONS</div>
            <div class="text">DIMENSIONS</div>
            <div class="text">DIMENSIONS</div>
        </div>
        <div class="hint">Move your mouse and hover</div>
    </div>

    <script>
        const container = document.getElementById('container');
        const wrapper = document.getElementById('wrapper');

        // Track mouse movement to rotate the 3D wrapper
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            
            // Apply the 3D rotation based on mouse position
            wrapper.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Add a smooth reset when mouse leaves the window
        document.addEventListener('mouseleave', () => {
            wrapper.style.transition = 'transform 0.5s ease-out';
            wrapper.style.transform = `rotateY(0deg) rotateX(0deg)`;
            
            // Remove transition after reset so mouse tracking is snappy again
            setTimeout(() => {
                wrapper.style.transition = 'transform 0.1s ease-out';
            }, 500);
        });
    </script>
</body>
</html>
