<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Hacker Decode Text</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #090a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Space Mono', monospace;
            overflow: hidden;
            /* Subtly moving background grid */
            background-image: 
                linear-gradient(rgba(0, 255, 170, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 170, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: center center;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
        }

        .glitch-text {
            font-size: 5rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #fff;
            position: relative;
            letter-spacing: 0.1em;
            cursor: pointer;
            text-shadow: 0 0 10px rgba(0, 255, 170, 0.3);
        }

        /* Glitch pseudo elements for hover effect */
        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-value);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;
        }

        .glitch-text::before {
            color: #0ff;
            z-index: -1;
            transform: translate(-2px, 2px);
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
        }

        .glitch-text::after {
            color: #f0f;
            z-index: -2;
            transform: translate(2px, -2px);
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
        }

        .glitch-text:hover::before {
            animation: glitch-anim-1 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
        }

        .glitch-text:hover::after {
            animation: glitch-anim-2 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite backwards;
        }

        @keyframes glitch-anim-1 {
            0% { transform: translate(0); clip-path: polygon(0 10%, 100% 10%, 100% 30%, 0 30%); }
            20% { transform: translate(-5px, 2px); clip-path: polygon(0 40%, 100% 40%, 100% 60%, 0 60%); }
            40% { transform: translate(5px, -2px); clip-path: polygon(0 20%, 100% 20%, 100% 40%, 0 40%); }
            60% { transform: translate(-2px, 5px); clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%); }
            80% { transform: translate(2px, -5px); clip-path: polygon(0 80%, 100% 80%, 100% 100%, 0 100%); }
            100% { transform: translate(0); clip-path: polygon(0 10%, 100% 10%, 100% 30%, 0 30%); }
        }

        @keyframes glitch-anim-2 {
            0% { transform: translate(0); clip-path: polygon(0 70%, 100% 70%, 100% 90%, 0 90%); }
            20% { transform: translate(5px, -2px); clip-path: polygon(0 10%, 100% 10%, 100% 30%, 0 30%); }
            40% { transform: translate(-5px, 2px); clip-path: polygon(0 50%, 100% 50%, 100% 70%, 0 70%); }
            60% { transform: translate(2px, -5px); clip-path: polygon(0 30%, 100% 30%, 100% 50%, 0 50%); }
            80% { transform: translate(-2px, 5px); clip-path: polygon(0 90%, 100% 90%, 100% 100%, 0 100%); }
            100% { transform: translate(0); clip-path: polygon(0 70%, 100% 70%, 100% 90%, 0 90%); }
        }

        .subtitle {
            color: rgba(0, 255, 170, 0.7);
            font-size: 1rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            position: relative;
        }

        .subtitle::after {
            content: '_';
            animation: blink 1s step-start infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Add data-value attribute identical to text content for the glitch effect to work -->
        <div class="glitch-text" data-value="CYBERNETIC">CYBERNETIC</div>
        <div class="glitch-text" data-value="PROTOCOL">PROTOCOL</div>
        <div class="subtitle">Hover over the text to decrypt</div>
    </div>

    <script>
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
        const textElements = document.querySelectorAll('.glitch-text');

        textElements.forEach(element => {
            let interval = null;

            // Trigger animation on hover
            element.onmouseover = event => {
                let iteration = 0;
                
                clearInterval(interval);
                
                // Get the original target word from data-value
                const originalText = event.target.dataset.value;

                interval = setInterval(() => {
                    event.target.innerText = originalText
                        .split("")
                        .map((letter, index) => {
                            // If the iteration has passed this letter's index, show the actual letter
                            if(index < iteration) {
                                return originalText[index];
                            }
                            // Otherwise, show a random character
                            return letters[Math.floor(Math.random() * letters.length)]
                        })
                        .join("");
                    
                    // The divisor controls the speed of the deciphering (higher = slower)
                    if(iteration >= originalText.length){ 
                        clearInterval(interval);
                    }
                    
                    iteration += 1 / 3;
                }, 30);
            }
            
            // Auto-trigger once on load for a cool entrance
            setTimeout(() => {
                element.onmouseover({target: element});
            }, Math.random() * 500 + 500);
        });
    </script>
</body>
</html>
