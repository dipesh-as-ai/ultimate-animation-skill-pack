<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plexus Constellation Typography</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #010104; /* Deep space black/blue */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Cinzel', serif; /* Elegant, thin serif font */
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-family: Arial, sans-serif;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div class="hint">Disturb the constellation</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        let width, height;
        let particles = [];
        
        const TEXT = "ETHEREAL";
        const FONT_SIZE = 150;
        const CONNECTION_DISTANCE = 35; // How close dots need to be to form a line
        const MOUSE_RADIUS = 150;
        
        let mouse = { x: -1000, y: -1000 };

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // 1. Draw text to offscreen canvas to get coordinate map
            const textCanvas = document.createElement('canvas');
            textCanvas.width = width;
            textCanvas.height = height;
            const textCtx = textCanvas.getContext('2d');
            
            textCtx.fillStyle = '#ffffff';
            textCtx.font = `${FONT_SIZE}px "Cinzel", serif`;
            textCtx.textAlign = 'center';
            textCtx.textBaseline = 'middle';
            textCtx.fillText(TEXT, width / 2, height / 2);
            
            const data = textCtx.getImageData(0, 0, width, height).data;
            particles = [];
            
            // 2. Spawn particles exactly on the text pixels
            // A higher density (lower step) means a denser spiderweb
            const step = 8;
            for(let y = 0; y < height; y += step) {
                for(let x = 0; x < width; x += step) {
                    if(data[(y * width + x) * 4 + 3] > 128) {
                        particles.push(new Node(x, y));
                    }
                }
            }
        }

        class Node {
            constructor(x, y) {
                // Target origin point
                this.ox = x;
                this.oy = y;
                
                // Current position (starts scattered for a beautiful assembly intro)
                this.x = x + (Math.random() - 0.5) * 1000;
                this.y = y + (Math.random() - 0.5) * 1000;
                
                // Physics
                this.vx = 0;
                this.vy = 0;
                
                // Organic breathing offset
                this.angle = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 0.02 + 0.01;
                this.orbitRadius = Math.random() * 5 + 2;
            }

            update() {
                // 1. Calculate organic breathing motion (orbiting the origin)
                this.angle += this.speed;
                let targetX = this.ox + Math.cos(this.angle) * this.orbitRadius;
                let targetY = this.oy + Math.sin(this.angle) * this.orbitRadius;

                // 2. Mouse interaction (Repel)
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < MOUSE_RADIUS) {
                    let force = (MOUSE_RADIUS - distance) / MOUSE_RADIUS;
                    // Push away from mouse
                    targetX -= (dx / distance) * force * 150;
                    targetY -= (dy / distance) * force * 150;
                }

                // 3. Spring physics: pull current position towards target position
                let spring = 0.05;
                let friction = 0.85;

                this.vx += (targetX - this.x) * spring;
                this.vy += (targetY - this.y) * spring;
                
                this.vx *= friction;
                this.vy *= friction;

                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                ctx.fillStyle = 'rgba(100, 200, 255, 0.8)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 1, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function render() {
            // Draw a deep space gradient background
            const grad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
            grad.addColorStop(0, '#040b16');
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            // Update all nodes
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
            }

            // --- The Plexus Effect (Drawing the constellation lines) ---
            // This is computationally heavy, so we use a spatial optimization:
            // We only check nodes against other nodes ahead of them in the array
            ctx.lineWidth = 0.5;
            for (let i = 0; i < particles.length; i++) {
                let p1 = particles[i];
                
                for (let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j];
                    
                    // Fast distance check without square root first
                    let dx = p1.x - p2.x;
                    let dy = p1.y - p2.y;
                    
                    // If they are potentially close enough
                    if (Math.abs(dx) < CONNECTION_DISTANCE && Math.abs(dy) < CONNECTION_DISTANCE) {
                        let distance = Math.sqrt(dx * dx + dy * dy);
                        
                        if (distance < CONNECTION_DISTANCE) {
                            // Opacity depends on how close they are
                            let opacity = 1 - (distance / CONNECTION_DISTANCE);
                            
                            // Glowing ethereal blue lines
                            ctx.strokeStyle = `rgba(100, 220, 255, ${opacity * 0.6})`;
                            
                            ctx.beginPath();
                            ctx.moveTo(p1.x, p1.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    }
                }
            }

            requestAnimationFrame(render);
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('mouseout', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });
        
        window.addEventListener('touchmove', (e) => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        window.addEventListener('resize', () => {
            init();
        });

        document.fonts.ready.then(() => {
            init();
            render();
        });
    </script>
</body>
</html>
