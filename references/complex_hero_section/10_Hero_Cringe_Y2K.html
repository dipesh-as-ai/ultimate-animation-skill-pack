<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funky Glitch Cringe Hero</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            /* Random mixed clashing colors */
            background: linear-gradient(45deg, #FF00FF, #00FF00, #FFFF00, #00FFFF, #FF0000, #4A00E0);
            background-size: 400% 400%;
            animation: psychoBG 2s infinite alternate;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: filter 0.1s;
        }

        @keyframes psychoBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 100%; }
        }

        /* Glitchy Text Wrapper */
        .glitch-wrapper {
            position: relative;
        }

        /* Funky Text styling - mismatched fonts and sizes */
        .funky-text {
            font-size: 8rem;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            line-height: 1;
            position: relative;
            z-index: 10;
        }

        .funky-text span:nth-child(1) { font-family: 'Times New Roman', serif; color: #00FF00; font-size: 10rem; }
        .funky-text span:nth-child(2) { font-family: 'Comic Sans MS', cursive; color: #FF00FF; font-size: 6rem; }
        .funky-text span:nth-child(3) { font-family: 'Courier New', monospace; color: #FFFF00; font-style: italic; }
        .funky-text span:nth-child(4) { font-family: 'Impact', sans-serif; color: #0000FF; text-decoration: underline; font-size: 12rem;}
        .funky-text span:nth-child(5) { font-family: 'Arial', sans-serif; color: #FF0000; letter-spacing: -20px; }

        /* The Glitch Effect via CSS */
        .glitch-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        .glitch-1 {
            color: #00FFFF;
            transform: translate(-10px, 5px);
            z-index: 9;
            clip-path: inset(10% 0 80% 0);
            animation: glitchAnim 0.3s infinite;
            mix-blend-mode: exclusion;
        }
        
        .glitch-2 {
            color: #FF00FF;
            transform: translate(10px, -5px);
            z-index: 11;
            clip-path: inset(80% 0 10% 0);
            animation: glitchAnim2 0.2s infinite reverse;
            mix-blend-mode: difference;
        }

        @keyframes glitchAnim {
            0% { clip-path: inset(10% 0 80% 0); transform: translate(-10px, 5px) skewX(20deg); }
            20% { clip-path: inset(40% 0 20% 0); transform: translate(10px, -5px) skewX(-20deg); }
            40% { clip-path: inset(80% 0 5% 0); transform: translate(-20px, 15px) skewX(0deg); }
            60% { clip-path: inset(5% 0 60% 0); transform: translate(20px, -15px) skewX(40deg); }
            80% { clip-path: inset(30% 0 40% 0); transform: translate(-5px, 20px) skewX(-10deg); }
            100% { clip-path: inset(70% 0 20% 0); transform: translate(5px, -20px) skewX(10deg); }
        }

        @keyframes glitchAnim2 {
            0% { clip-path: inset(20% 0 60% 0); transform: translate(10px, -5px) skewY(10deg); }
            20% { clip-path: inset(60% 0 10% 0); transform: translate(-10px, 5px) skewY(-10deg); }
            40% { clip-path: inset(10% 0 80% 0); transform: translate(20px, -15px) skewY(0deg); }
            60% { clip-path: inset(80% 0 5% 0); transform: translate(-20px, 15px) skewY(30deg); }
            80% { clip-path: inset(40% 0 30% 0); transform: translate(5px, -20px) skewY(-5deg); }
            100% { clip-path: inset(5% 0 70% 0); transform: translate(-5px, 20px) skewY(5deg); }
        }

        /* Chaotic Typo Text */
        .typo-text {
            font-family: monospace;
            font-size: 2rem;
            color: #FFF;
            background: #000;
            padding: 5px;
            margin-top: 30px;
            transform: rotate(-5deg);
            animation: shake 0.1s infinite;
            mix-blend-mode: overlay;
        }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(-5deg); }
            50% { transform: translate(-1px, -2px) rotate(-7deg); }
            100% { transform: translate(1px, 2px) rotate(-3deg); }
        }

        /* Funky Button */
        .funky-btn {
            margin-top: 50px;
            padding: 20px 40px;
            font-size: 2rem;
            font-weight: bold;
            font-family: 'Comic Sans MS', cursive;
            background: #00FFFF;
            color: #FF0000;
            border: 10px dotted #FF00FF;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 15px 15px 0px #FFFF00;
            transition: all 0.1s;
        }

        .funky-btn:hover {
            background: #FF0000;
            color: #00FFFF;
            border: 10px dashed #00FF00;
            box-shadow: -15px -15px 0px #0000FF;
            transform: scale(1.5) rotate(15deg);
        }

        /* Inverted State triggered by JS */
        body.inverted {
            filter: invert(1) hue-rotate(180deg) saturate(3);
        }

    </style>
</head>
<body>

    <div class="glitch-wrapper gs-main">
        <div class="funky-text">
            <span>F</span><span>u</span><span>N</span><span>k</span><span>Y</span>
        </div>
        <!-- Duplicated for CSS clip-path glitching -->
        <div class="funky-text glitch-layer glitch-1">
            <span>F</span><span>u</span><span>N</span><span>k</span><span>Y</span>
        </div>
        <div class="funky-text glitch-layer glitch-2">
            <span>F</span><span>u</span><span>N</span><span>k</span><span>Y</span>
        </div>
    </div>

    <div class="typo-text">SsyTEM eRRor // deZign.exe fAilEd!!!1</div>

    <button class="funky-btn" id="funkyBtn">DO NOT HOVER</button>

    <script>
        // --- 1. Aggressive Color / Filter Inversion on Hover ---
        const btn = document.getElementById('funkyBtn');
        let invertInterval;

        btn.addEventListener('mouseenter', () => {
            // Rapidly toggle the inverted class
            invertInterval = setInterval(() => {
                document.body.classList.toggle('inverted');
            }, 50); // extremely fast strobe
        });

        btn.addEventListener('mouseleave', () => {
            clearInterval(invertInterval);
            document.body.classList.remove('inverted');
        });

        // --- 2. Random Typo Glitching (JS) ---
        const typoElement = document.querySelector('.typo-text');
        const originalText = "SsyTEM eRRor // deZign.exe fAilEd!!!1";
        const chars = "!<>-_\\\\/[]{}—=+*^?#________";

        setInterval(() => {
            if(Math.random() > 0.7) {
                // Randomly scramble text temporarily
                let scrambled = originalText.split('').map(char => {
                    return Math.random() > 0.8 ? chars[Math.floor(Math.random() * chars.length)] : char;
                }).join('');
                typoElement.innerText = scrambled;
            } else {
                typoElement.innerText = originalText;
            }
        }, 100);

        // --- 3. GSAP Mouse Skew (Makes the whole page feel nauseating/funky) ---
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 40; // up to 20deg skew
            const y = (e.clientY / window.innerHeight - 0.5) * 40;

            gsap.to(document.body, {
                skewX: x,
                skewY: y,
                duration: 0.5,
                ease: "power2.out"
            });
            
            // Randomly scale the main word based on mouse position
            gsap.to(".gs-main", {
                scale: 1 + Math.abs(x/40),
                rotation: x,
                duration: 0.3
            });
        });
    </script>
</body>
</html>
