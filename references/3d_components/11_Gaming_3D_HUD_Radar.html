<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Isometric Tactical Radar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030812;
            --hologram-cyan: #00F0FF;
            --hostile-red: #FF2A2A;
            --friendly-green: #00FF66;
            --grid-line: rgba(0, 240, 255, 0.15);
        }

        body {
            margin: 0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg); font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            /* Subtle scanlines over the whole screen */
            background-image: repeating-linear-gradient(to bottom, transparent, transparent 2px, rgba(0,0,0,0.5) 2px, rgba(0,0,0,0.5) 4px);
        }

        /* --- 3D Scene --- */
        .scene {
            width: 100vw; height: 100vh;
            perspective: 2000px;
            display: flex; align-items: center; justify-content: center;
        }

        /* The master container for the radar that creates the isometric angle */
        .radar-assembly {
            width: 500px; height: 500px;
            position: relative;
            transform-style: preserve-3d;
            /* Perfect Isometric Projection */
            transform: rotateX(60deg) rotateZ(-45deg);
        }

        /* --- The Tactical Floor Grid --- */
        .floor {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 2px solid var(--hologram-cyan);
            border-radius: 50%; /* Make it circular */
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 25px 25px;
            box-shadow: inset 0 0 100px rgba(0, 240, 255, 0.2);
            /* Sits at the bottom */
            transform: translateZ(-20px);
        }

        /* --- Radar Rings (Floating in Z Space) --- */
        .ring {
            position: absolute; top: 50%; left: 50%;
            border: 1px solid var(--hologram-cyan);
            border-radius: 50%;
            transform-style: preserve-3d;
        }
        
        .ring-1 {
            width: 400px; height: 400px; margin: -200px 0 0 -200px;
            transform: translateZ(10px);
            border-width: 2px; border-style: dashed;
            animation: spin 30s linear infinite;
        }

        .ring-2 {
            width: 250px; height: 250px; margin: -125px 0 0 -125px;
            transform: translateZ(30px);
            border: 4px solid rgba(0, 240, 255, 0.3);
            animation: spin 15s linear infinite reverse;
        }
        
        /* Tactical compass markers on ring 2 */
        .ring-2::before, .ring-2::after {
            content: ''; position: absolute; background: var(--hologram-cyan);
        }
        .ring-2::before { top: -10px; left: 50%; width: 2px; height: 20px; margin-left: -1px; }
        .ring-2::after { top: 50%; right: -10px; width: 20px; height: 2px; margin-top: -1px; }

        @keyframes spin { 100% { transform: translateZ(10px) rotateZ(360deg); } }

        /* --- The Scanner Sweep --- */
        .scanner {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 70%, rgba(0, 240, 255, 0.4) 100%);
            transform: translateZ(20px);
            animation: radarSweep 4s linear infinite;
        }
        /* Bright leading edge of the scanner */
        .scanner::after {
            content: ''; position: absolute; top: 0; left: 50%; width: 2px; height: 50%;
            background: #FFF; box-shadow: 0 0 10px var(--hologram-cyan);
            transform-origin: bottom center;
        }

        @keyframes radarSweep { 100% { transform: translateZ(20px) rotateZ(360deg); } }

        /* --- Player Marker (Center) --- */
        .player {
            position: absolute; top: 50%; left: 50%;
            width: 0; height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 20px solid var(--hologram-cyan);
            margin: -10px 0 0 -10px;
            transform: translateZ(50px) rotateZ(45deg); /* Pointing "forward" in isometric */
            filter: drop-shadow(0 0 10px var(--hologram-cyan));
        }

        /* 3D Pillar underneath player */
        .player::after {
            content: ''; position: absolute; top: 20px; left: -1px; width: 2px; height: 50px;
            background: rgba(0, 240, 255, 0.5);
            /* Rotate X so the line drops straight down to the floor grid */
            transform-origin: top center;
            transform: rotateX(-90deg);
        }

        /* --- Entity Blips --- */
        .blip {
            position: absolute; width: 12px; height: 12px;
            border-radius: 50%; margin: -6px 0 0 -6px;
            transform-style: preserve-3d;
            animation: pulseBlip 2s infinite;
        }
        
        /* 3D stem dropping to the floor */
        .blip::after {
            content: ''; position: absolute; top: 6px; left: 5px; width: 2px;
            background: inherit; opacity: 0.4;
            transform-origin: top center; transform: rotateX(-90deg);
        }

        @keyframes pulseBlip {
            0% { box-shadow: 0 0 0 0 inherit; }
            70% { box-shadow: 0 0 0 20px transparent; }
            100% { box-shadow: 0 0 0 0 transparent; }
        }

        .hostile { background: var(--hostile-red); box-shadow: 0 0 10px var(--hostile-red); }
        .friendly { background: var(--friendly-green); box-shadow: 0 0 10px var(--friendly-green); }

        /* Example Blip Placements */
        .b1 { top: 30%; left: 70%; transform: translateZ(40px); }
        .b1::after { height: 60px; } /* Must match Z + floor depth */

        .b2 { top: 60%; left: 20%; transform: translateZ(80px); }
        .b2::after { height: 100px; } 

        .b3 { top: 80%; left: 60%; transform: translateZ(20px); }
        .b3::after { height: 40px; }

        /* --- UI Overlay --- */
        .ui-text {
            position: absolute; bottom: 40px; left: 40px; color: var(--hologram-cyan);
            font-size: 14px; text-transform: uppercase;
        }
        .ui-text p { margin: 5px 0; }
        .warning { color: var(--hostile-red); font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

    </style>
</head>
<body>

    <div class="scene" id="scene">
        <div class="radar-assembly" id="radar">
            
            <div class="floor"></div>
            
            <!-- Rotating Rings -->
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            
            <!-- Scanning Laser -->
            <div class="scanner"></div>

            <!-- The Center Player -->
            <div class="player"></div>

            <!-- Entities in 3D Space -->
            <div class="blip hostile b1"></div>
            <div class="blip hostile b2"></div>
            <div class="blip friendly b3"></div>

        </div>
    </div>

    <!-- 2D Screen Overlay -->
    <div class="ui-text">
        <p>SYS: TACTICAL MAPPING ONLINE</p>
        <p>SECTOR: 7G</p>
        <p class="warning">WARNING: MULTIPLE HOSTILES DETECTED</p>
    </div>

    <script>
        const scene = document.getElementById('scene');
        const radar = document.getElementById('radar');

        // Allow user to slightly adjust the isometric angle by moving mouse
        scene.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 2;
            const y = (e.clientY / window.innerHeight - 0.5) * 2;
            
            // Base is 60deg X, -45deg Z
            gsap.to(radar, {
                rotateX: 60 + (-y * 15),
                rotateZ: -45 + (x * 15),
                duration: 1,
                ease: "power2.out"
            });
        });

        scene.addEventListener('mouseleave', () => {
            gsap.to(radar, {
                rotateX: 60,
                rotateZ: -45,
                duration: 1.5,
                ease: "elastic.out(1, 0.4)"
            });
        });

    </script>
</body>
</html>
