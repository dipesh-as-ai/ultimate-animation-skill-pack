<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Gaming Weapon Inventory Card</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0A0A0E;
            --card-bg: #111116;
            --neon-red: #FF4655; /* Valorant Red */
            --neon-blue: #00FFFF;
            --rarity-gold: #FFD700;
        }

        body {
            margin: 0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: var(--bg); font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            /* Grid background for tactical feel */
            background-image: 
                linear-gradient(rgba(255, 70, 85, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 70, 85, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .scene {
            width: 400px; height: 600px;
            perspective: 1500px;
        }

        .card {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            background: var(--card-bg);
            border: 2px solid #222;
            border-radius: 12px;
            /* Cutout corners via clip-path for that sci-fi look */
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            transition: border-color 0.3s;
        }

        .card:hover {
            border-color: var(--neon-red);
            box-shadow: 0 0 40px rgba(255, 70, 85, 0.2);
        }

        /* Tactical inner grid */
        .card-inner-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: 
                repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.02) 10px, rgba(255,255,255,0.02) 20px);
            z-index: 1;
        }

        /* --- Holographic Glare (Tracks Mouse) --- */
        .glare {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1) 0%, transparent 60%);
            mix-blend-mode: color-dodge;
            opacity: 0; transition: opacity 0.3s;
        }
        .card:hover .glare { opacity: 1; }

        /* --- Weapon Image (Pops out in Z-space) --- */
        .weapon {
            position: absolute; top: 40%; left: 50%;
            width: 120%; height: auto;
            /* Uses a high-tech looking object */
            background: url('https://images.unsplash.com/photo-1612287230202-1ff1d85d1bdf?auto=format&fit=crop&q=80') center/cover;
            /* Transform magic */
            transform: translate(-50%, -50%) translateZ(60px) rotate(-15deg);
            z-index: 5; pointer-events: none;
            filter: drop-shadow(0 20px 20px rgba(0,0,0,0.8));
            /* Clip it cleanly */
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            /* We simulate the weapon using an image of a neon controller/tech part for now, 
               but we make it look like a floating asset */
            height: 300px;
        }

        /* --- UI Overlay Elements --- */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 30px; display: flex; flex-direction: column; justify-content: space-between;
            z-index: 6; pointer-events: none;
            transform: translateZ(30px);
        }

        /* Top Header */
        .header { display: flex; justify-content: space-between; align-items: flex-start; }
        .rarity-badge {
            background: rgba(255, 215, 0, 0.1); border: 1px solid var(--rarity-gold);
            color: var(--rarity-gold); padding: 4px 12px; font-weight: 800;
            font-size: 14px; letter-spacing: 2px;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }
        .item-type {
            color: #888; font-size: 14px; letter-spacing: 4px; font-weight: 700;
        }

        /* Bottom Details */
        .details { text-align: left; }
        .weapon-name {
            font-size: 3rem; color: #FFF; font-weight: 800; line-height: 1;
            text-transform: uppercase; margin-bottom: 5px;
            text-shadow: 2px 2px 0 var(--neon-red);
        }
        .stats {
            display: flex; gap: 20px; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;
        }
        .stat-box { display: flex; flex-direction: column; }
        .stat-label { font-size: 12px; color: #666; letter-spacing: 1px; }
        .stat-val { font-size: 24px; color: var(--neon-blue); font-weight: 700; }

        /* Tactical brackets around the card */
        .bracket { position: absolute; width: 20px; height: 20px; border: 2px solid var(--neon-red); z-index: 8; transform: translateZ(10px); opacity: 0; transition: opacity 0.3s; }
        .tl { top: -10px; left: -10px; border-right: none; border-bottom: none; }
        .tr { top: -10px; right: -10px; border-left: none; border-bottom: none; }
        .bl { bottom: -10px; left: -10px; border-right: none; border-top: none; }
        .br { bottom: -10px; right: -10px; border-left: none; border-top: none; }
        .card:hover .bracket { opacity: 1; }

    </style>
</head>
<body>

    <div class="scene" id="scene">
        <div class="card" id="card">
            
            <div class="card-inner-bg"></div>
            
            <!-- Dynamic Glare -->
            <div class="glare" id="glare"></div>

            <!-- Asset popping out -->
            <div class="weapon"></div>

            <!-- 3D UI -->
            <div class="ui-layer">
                <div class="header">
                    <div class="rarity-badge">LEGENDARY</div>
                    <div class="item-type">HEAVY // RIFLE</div>
                </div>

                <div class="details">
                    <div class="weapon-name">VANDAL_X</div>
                    <div style="color: #AAA; font-size: 14px;">Plasma-infused tactical assault rifle.</div>
                    
                    <div class="stats">
                        <div class="stat-box">
                            <span class="stat-label">DMG</span>
                            <span class="stat-val">160</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">FR</span>
                            <span class="stat-val">9.25</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">MAG</span>
                            <span class="stat-val">25</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Hover Brackets -->
            <div class="bracket tl"></div>
            <div class="bracket tr"></div>
            <div class="bracket bl"></div>
            <div class="bracket br"></div>

        </div>
    </div>

    <script>
        const scene = document.getElementById('scene');
        const card = document.getElementById('card');
        const glare = document.getElementById('glare');

        // GSAP QuickSetters for performance
        const setRotX = gsap.quickSetter(card, "rotateX", "deg");
        const setRotY = gsap.quickSetter(card, "rotateY", "deg");

        scene.addEventListener('mousemove', (e) => {
            const rect = scene.getBoundingClientRect();
            // -1 to 1 normalized
            const x = (e.clientX - rect.left) / rect.width - 0.5;
            const y = (e.clientY - rect.top) / rect.height - 0.5;

            // Aggressive snap tilt
            setRotX(-y * 30);
            setRotY(x * 30);

            // Move glare
            gsap.to(glare, {
                x: x * 100,
                y: y * 100,
                duration: 0.1
            });
        });

        scene.addEventListener('mouseleave', () => {
            gsap.to(card, {
                rotateX: 0,
                rotateY: 0,
                duration: 0.8,
                ease: "elastic.out(1, 0.4)" // Satisfying spring reset
            });
            gsap.to(glare, { x: 0, y: 0, duration: 0.5 });
        });
    </script>
</body>
</html>
